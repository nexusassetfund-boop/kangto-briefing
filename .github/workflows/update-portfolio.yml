name: 모델 포트폴리오 갱신
on:
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: portfolio
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 시트 미러링
        run: python scanner/fetch_sheet.py
      - name: 결과 커밋
        run: |
          bash .github/scripts/commit-data.sh "portfolio: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')" docs/data/portfolio.json
