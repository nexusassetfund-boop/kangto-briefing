name = "nexus-platform"
main = "worker.js"
compatibility_date = "2025-11-01"
workers_dev = true

[assets]
directory = "./assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "KV"
id = "d2ef69d350894dab85bcb54c6d9a80b4"

[[durable_objects.bindings]]
name = "BOOK"
class_name = "BookStore"

[triggers]
crons = ["*/10 0-6 * * 1-5", "7 1-6 * * 1-5", "35 6 * * 1-5", "45 6 * * 1-5"]

# 시크릿(ADMIN_TOKEN, GH_TOKEN)은 Cloudflare에 저장돼 있어 배포해도 유지됨.
# worker.js는 2026-07-13 배포본(esbuild 번들)을 API로 내려받은 것.
